name: Publication Pipeline

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**/*.md'
      - 'publication/**'
      - '.github/workflows/publication-pipeline.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'publication/**'
      - '.github/workflows/publication-pipeline.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Validate publication sources and profiles
    runs-on: ubuntu-latest
    steps:
      - name: Check out source revision
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Validate required files and YAML profiles
        shell: python
        run: |
          from pathlib import Path
          import sys
          import yaml

          required = [
              Path('docs/publication/PUBLICATION-PIPELINE.md'),
              Path('publication/README.md'),
          ]
          missing = [str(path) for path in required if not path.is_file()]
          if missing:
              print('Missing required publication files:')
              print('\n'.join(f'- {path}' for path in missing))
              sys.exit(1)

          profiles = sorted(Path('publication/profiles').glob('*.yml'))
          if not profiles:
              print('No publication profiles found.')
              sys.exit(1)

          errors = []
          required_keys = {'id', 'status', 'purpose', 'outputs'}
          for profile in profiles:
              try:
                  data = yaml.safe_load(profile.read_text(encoding='utf-8'))
              except Exception as exc:
                  errors.append(f'{profile}: invalid YAML: {exc}')
                  continue

              if not isinstance(data, dict):
                  errors.append(f'{profile}: profile root must be a mapping')
                  continue

              absent = sorted(required_keys - set(data))
              if absent:
                  errors.append(f"{profile}: missing keys: {', '.join(absent)}")

              if data.get('id') != profile.stem:
                  errors.append(
                      f"{profile}: id '{data.get('id')}' must match filename '{profile.stem}'"
                  )

              outputs = data.get('outputs')
              if not isinstance(outputs, list) or not outputs:
                  errors.append(f'{profile}: outputs must be a non-empty list')

          if errors:
              print('Publication profile validation failed:')
              print('\n'.join(f'- {error}' for error in errors))
              sys.exit(1)

          print(f'Validated {len(profiles)} publication profiles.')

  build-preview-manifest:
    name: Build traceability preview
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out source revision
        uses: actions/checkout@v4

      - name: Create publication manifest
        run: |
          mkdir -p build/publication
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = {
              'pipeline_status': 'scaffold',
              'source_commit': os.environ['GITHUB_SHA'],
              'repository': os.environ['GITHUB_REPOSITORY'],
              'workflow_run': os.environ['GITHUB_RUN_ID'],
              'note': (
                  'Rendering generators are not yet implemented; this manifest '
                  'demonstrates profile discovery and provenance capture.'
              ),
              'profiles': sorted(path.stem for path in Path('publication/profiles').glob('*.yml')),
          }
          Path('build/publication/manifest.json').write_text(
              json.dumps(manifest, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Upload traceability preview
        uses: actions/upload-artifact@v4
        with:
          name: publication-pipeline-preview
          path: build/publication/manifest.json
          if-no-files-found: error
