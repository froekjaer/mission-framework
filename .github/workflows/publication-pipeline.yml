name: Publication Pipeline

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**/*.md'
      - 'publication/**'
      - '.github/workflows/publication-pipeline.yml'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - 'publication/**'
      - '.github/workflows/publication-pipeline.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: publication-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build publication suite
    runs-on: ubuntu-latest
    steps:
      - name: Check out source revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install renderers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pandoc
          python -m pip install --disable-pip-version-check pyyaml weasyprint

      - name: Validate publication profiles
        shell: python
        run: |
          from pathlib import Path
          import sys
          import yaml

          required = [
              Path('docs/publication/PUBLICATION-PIPELINE.md'),
              Path('publication/README.md'),
              Path('publication/book.yml'),
              Path('publication/executive-brief.md'),
              Path('publication/presentation.md'),
              Path('publication/build.py'),
          ]
          missing = [str(path) for path in required if not path.is_file()]
          if missing:
              print('Missing required publication files:')
              print('\n'.join(f'- {path}' for path in missing))
              sys.exit(1)

          profiles = sorted(Path('publication/profiles').glob('*.yml'))
          errors = []
          required_keys = {'id', 'status', 'purpose', 'outputs'}
          for profile in profiles:
              try:
                  data = yaml.safe_load(profile.read_text(encoding='utf-8'))
              except Exception as exc:
                  errors.append(f'{profile}: invalid YAML: {exc}')
                  continue
              if not isinstance(data, dict):
                  errors.append(f'{profile}: profile root must be a mapping')
                  continue
              absent = sorted(required_keys - set(data))
              if absent:
                  errors.append(f"{profile}: missing keys: {', '.join(absent)}")
              if data.get('id') != profile.stem:
                  errors.append(f"{profile}: id must match filename")
              if not isinstance(data.get('outputs'), list) or not data['outputs']:
                  errors.append(f'{profile}: outputs must be a non-empty list')
          if errors:
              print('\n'.join(f'- {error}' for error in errors))
              sys.exit(1)
          print(f'Validated {len(profiles)} publication profiles.')

      - name: Render all publications
        run: python publication/build.py

      - name: Show generated files
        run: find dist -type f -printf '%p\n' | sort

      - name: Upload complete publication suite
        uses: actions/upload-artifact@v4
        with:
          name: mission-framework-publications-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Upload GitHub Pages artefact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/site

  deploy-pages:
    name: Publish GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy generated site
        id: deployment
        uses: actions/deploy-pages@v4
